# Fora da main: build + push como latest-dev (para dev/teste).
# Na main use build-tag-push-prod.yaml para não subir latest-dev em prod.
on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      gcp_project_id:
        required: true
        type: string
      gcp_location:
        required: true
        type: string
        description: "Região do GAR (ex.: us-central1)"
      gcp_workload_identity_provider:
        required: true
        type: string
      gcp_service_account:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      GAR_REGISTRY: ${{ inputs.gcp_location }}-docker.pkg.dev/${{ inputs.gcp_project_id }}/${{ inputs.app_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
          service_account: ${{ inputs.gcp_service_account }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Criar repositório GAR se não existir
        run: |
          gcloud artifacts repositories describe "${{ inputs.app_name }}" \
            --location="${{ inputs.gcp_location }}" \
            --project="${{ inputs.gcp_project_id }}" 2>/dev/null || \
          gcloud artifacts repositories create "${{ inputs.app_name }}" \
            --repository-format=docker \
            --location="${{ inputs.gcp_location }}" \
            --project="${{ inputs.gcp_project_id }}" \
            --quiet

      - name: Docker login no Artifact Registry
        run: |
          gcloud auth configure-docker ${{ inputs.gcp_location }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build -t $GAR_REGISTRY/${{ inputs.app_name }}:latest-dev .

      - name: Push (latest-dev)
        run: |
          docker push $GAR_REGISTRY/${{ inputs.app_name }}:latest-dev
