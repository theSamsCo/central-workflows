# Pipeline de CI: build + push para o GAR. Deploy é feito via Argo CD.
on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
        description: "prod ou dev"
      app_name:
        required: true
        type: string
      gar_registry:
        required: true
        type: string
        description: "URL base do GAR (ex.: us-central1-docker.pkg.dev/projeto/repo)"
      gcp_wif_provider:
        required: true
        type: string
        description: "Workload Identity Provider do ambiente"
      gcp_service_account:
        required: true
        type: string
        description: "Service Account do ambiente"

permissions:
  id-token: write
  contents: write  # necessário para git push da tag (prod)

jobs:
  build-prod:
    if: inputs.env == 'prod'
    uses: theSamsCo/central-workflows/.github/workflows/build-tag-push-prod.yaml@v1
    with:
      app_name: ${{ inputs.app_name }}
      registry: ${{ inputs.gar_registry }}
      tag_kind: patch
      gcp_workload_identity_provider: ${{ inputs.gcp_wif_provider }}
      gcp_service_account: ${{ inputs.gcp_service_account }}

  build-dev:
    if: inputs.env == 'dev'
    uses: theSamsCo/central-workflows/.github/workflows/build-and-push.yaml@v1
    with:
      app_name: ${{ inputs.app_name }}
      registry: ${{ inputs.gar_registry }}
      gcp_workload_identity_provider: ${{ inputs.gcp_wif_provider }}
      gcp_service_account: ${{ inputs.gcp_service_account }}
