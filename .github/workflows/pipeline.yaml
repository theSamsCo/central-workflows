# Pipeline de CI: build + push para o GAR. Deploy é feito via Argo CD.
on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
        description: "prod ou dev"
      app_name:
        required: true
        type: string
      gcp_project_id:
        required: true
        type: string
      gcp_location:
        required: true
        type: string
        description: "Região do GAR (ex.: us-central1)"
      gcp_wif_provider:
        required: true
        type: string
      gcp_service_account:
        required: true
        type: string

permissions:
  id-token: write
  contents: write  # necessário para git push da tag (prod)

jobs:
  build-prod:
    if: inputs.env == 'prod'
    uses: theSamsCo/central-workflows/.github/workflows/build-tag-push-prod.yaml@v1
    with:
      app_name: ${{ inputs.app_name }}
      gcp_project_id: ${{ inputs.gcp_project_id }}
      gcp_location: ${{ inputs.gcp_location }}
      tag_kind: patch
      gcp_workload_identity_provider: ${{ inputs.gcp_wif_provider }}
      gcp_service_account: ${{ inputs.gcp_service_account }}

  build-dev:
    if: inputs.env == 'dev'
    uses: theSamsCo/central-workflows/.github/workflows/build-and-push.yaml@v1
    with:
      app_name: ${{ inputs.app_name }}
      gcp_project_id: ${{ inputs.gcp_project_id }}
      gcp_location: ${{ inputs.gcp_location }}
      gcp_workload_identity_provider: ${{ inputs.gcp_wif_provider }}
      gcp_service_account: ${{ inputs.gcp_service_account }}
