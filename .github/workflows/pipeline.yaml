# Pipeline de CI: build + push para o GAR. Deploy é feito via Argo CD.
on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
        description: "prod ou dev"
      app_name:
        required: true
        type: string

permissions:
  id-token: write
  contents: write  # necessário para git push da tag (prod)

jobs:
  build-prod:
    if: inputs.env == 'prod'
    uses: thesamsco/.github/.github/workflows/build-tag-push-prod.yaml@v1
    with:
      app_name: ${{ inputs.app_name }}
      registry: ${{ vars.GAR_REGISTRY }}
      tag_kind: patch
      gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_PROD }}
      gcp_service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PROD }}

  build-dev:
    if: inputs.env == 'dev'
    uses: thesamsco/.github/.github/workflows/build-and-push.yaml@v1
    with:
      app_name: ${{ inputs.app_name }}
      registry: ${{ vars.GAR_REGISTRY }}
      gcp_workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_DEV }}
      gcp_service_account: ${{ vars.GCP_SERVICE_ACCOUNT_DEV }}
