# Rollback: faz deploy da imagem com a tag informada (versão anterior no registry).
# Use quando precisar voltar para uma versão já publicada.
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Tag da imagem no registry para a qual fazer rollback (ex.: 1.2.3)"
      app_name:
        required: true
        type: string
      registry:
        required: true
        type: string
        description: "URL do registry no Artifact Registry"
      gcp_workload_identity_provider:
        required: true
        type: string
      gcp_service_account:
        required: true
        type: string
      gke_cluster_name:
        required: true
        type: string
      gke_cluster_location:
        required: true
        type: string
      namespace:
        required: true
        type: string
      values_file:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: rollback-${{ inputs.namespace }}-${{ inputs.app_name }}
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.gcp_workload_identity_provider }}
          service_account: ${{ inputs.gcp_service_account }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ inputs.gke_cluster_name }}
          location: ${{ inputs.gke_cluster_location }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.12.0"

      - name: Helm OCI Login (Artifact Registry)
        run: |
          gcloud auth print-access-token \
          | helm registry login \
              --username oauth2accesstoken \
              --password-stdin \
              ${{ inputs.registry }}

      - name: Rollback to version ${{ inputs.version }}
        run: |
          echo "Fazendo rollback para imagem com tag: ${{ inputs.version }}"
          helm upgrade --install \
            -f ${{ inputs.values_file }} \
            ${{ inputs.app_name }} \
            oci://${{ inputs.registry }}/helm-chart \
            --namespace ${{ inputs.namespace }} \
            --force \
            --wait \
            --timeout 10m0s \
            --set="appVersion=${{ inputs.version }}" \
            --set="job.jobs[0].image.tag=${{ inputs.version }}" \
            --version 2.0.1
